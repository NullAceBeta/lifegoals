<div style="max-width: 600px; margin: 40px auto; font-family: Arial, sans-serif; text-align: center;">
  
  <h1>LifeGoals: Mis metas en la vida | by: Carlos Jesús (NullAceBeta) </h1>
  <p>Your goal list ({{ listaMetas().length }})</p>

  <div style="margin-bottom: 30px;">
    <input #nuevaMeta type="text" placeholder="Escribe una meta..." 
           style="padding: 10px; width: 70%; font-size: 16px;">
    <button (click)="agregarMeta(nuevaMeta)" 
            style="padding: 10px 20px; font-size: 16px; margin-left: 10px; cursor: pointer;">
      add an item
    </button>
  </div>

  <ul style="list-style-type: none; padding: 0;">
    @for (meta of listaMetas(); track meta.id) {
      <li style="display: flex; justify-content: space-between; align-items: center; 
                 padding: 15px; border-bottom: 1px solid #ccc; font-size: 18px;">
        
        <span>{{ meta.texto }}</span>
        
        <button (click)="eliminarMeta(meta.id)" 
                style="color: white; background-color: #ff4d4d; border: none; 
                       padding: 5px 10px; cursor: pointer; border-radius: 4px;">
          delete
        </button>
        
      </li>
    } @empty {
      <p style="color: gray; margin-top: 20px;">No tienes metas registradas. ¡Añade una!</p>
    }
  </ul>

</div>
